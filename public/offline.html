<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<title>You're offline — Ascent</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0f1a;
    color: #e6edf3;
    text-align: center;
  }
  @media (prefers-color-scheme: light) {
    body { background: #f7f9fb; color: #0f1720; }
  }
  .card { max-width: 360px; }
  h1 { font-size: 1.3rem; margin: 16px 0 8px; }
  p { font-size: 0.95rem; opacity: 0.8; line-height: 1.5; }
  button {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #0f766e;
    color: #fff;
    font-size: 0.95rem;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>Ascent couldn't load — there's no internet connection and nothing saved for this page yet. Reconnect and try again.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
