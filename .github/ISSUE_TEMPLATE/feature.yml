name: Feature request
description: New functionality or user-visible improvement
labels: []
body:
  - type: markdown
    attributes:
      value: |
        **Fill in every required field.** Incomplete issues will be closed.
        Label line (first line of body) must include `type:feat`, one `priority:*`, and at least one `domain:*` — see [CLAUDE.md label taxonomy](../blob/main/CLAUDE.md).

  - type: textarea
    id: label-line
    attributes:
      label: Label line
      description: "Copy-paste and fill: `type:feat` `priority:?` `domain:?`"
      placeholder: "`type:feat` `priority:medium` `domain:ui`"
    validations:
      required: true

  - type: textarea
    id: what-why
    attributes:
      label: What / Why
      description: What needs to change and why it matters to users.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Files affected, out-of-scope items.
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing requirements
      description: Unit / integration / E2E tests that must be written or updated.
    validations:
      required: true

  - type: checkboxes
    id: docs
    attributes:
      label: Doc changes checklist
      options:
        - label: "`CHANGELOG.md`"
        - label: "`CLAUDE.md` (if a convention changed)"
        - label: "`AGENTS.md` (keep in sync with CLAUDE.md)"
        - label: "`docs/architecture.md` — Build Log entry (if structure/module changed)"
        - label: "`docs/api.md` (if a public contract changed)"

  - type: textarea
    id: blocked
    attributes:
      label: Blocked by / Blocks / Safe to run in parallel
      placeholder: |
        - Blocked by: #N
        - Blocks: #M
        - Safe to run in parallel with: #X, #Y
    validations:
      required: true

  - type: input
    id: milestone
    attributes:
      label: Milestone
      placeholder: "Phase 0 — Foundation & Standards"
    validations:
      required: true
