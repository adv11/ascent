name: Documentation
description: Improve, add, or correct documentation
labels: []
body:
  - type: markdown
    attributes:
      value: |
        **Fill in every required field.** Incomplete issues will be closed.
        Label line must include `type:docs`, one `priority:*`, and at least one `domain:*`.

  - type: textarea
    id: label-line
    attributes:
      label: Label line
      description: "Copy-paste and fill: `type:docs` `priority:?` `domain:?`"
      placeholder: "`type:docs` `priority:low` `domain:infra`"
    validations:
      required: true

  - type: textarea
    id: what-why
    attributes:
      label: What / Why
      description: What documentation is missing, wrong, or needs improvement, and why.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which docs files are affected. Out-of-scope items.
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing requirements
      description: Manual review steps (e.g. "read end-to-end as a first-time contributor"), or N/A.
    validations:
      required: true

  - type: checkboxes
    id: docs
    attributes:
      label: Doc changes checklist
      options:
        - label: "`CHANGELOG.md`"
        - label: "`CLAUDE.md` (if a convention changed)"
        - label: "`AGENTS.md` (keep in sync with CLAUDE.md)"
        - label: "`docs/architecture.md` — Build Log entry (if structure/module changed)"

  - type: textarea
    id: blocked
    attributes:
      label: Blocked by / Blocks / Safe to run in parallel
      placeholder: |
        - Blocked by: nothing
        - Blocks: nothing
        - Safe to run in parallel with: all
    validations:
      required: true

  - type: input
    id: milestone
    attributes:
      label: Milestone
      placeholder: "Phase 0 — Foundation & Standards"
    validations:
      required: true
