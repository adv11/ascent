name: Chore / Refactor
description: Maintenance, dependencies, config, or code restructuring with no product change
labels: []
body:
  - type: markdown
    attributes:
      value: |
        **Fill in every required field.** Incomplete issues will be closed.
        Label line must include `type:chore` and/or `type:refactor`, one `priority:*`, and at least one `domain:*`.

  - type: textarea
    id: label-line
    attributes:
      label: Label line
      description: "Copy-paste and fill: `type:chore` `priority:?` `domain:?`"
      placeholder: "`type:chore` `type:refactor` `priority:medium` `domain:infra`"
    validations:
      required: true

  - type: textarea
    id: what-why
    attributes:
      label: What / Why
      description: What maintenance or restructuring is needed and why.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Files affected, out-of-scope items.
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing requirements
      description: Confirm no runtime behaviour changes, or describe what tests verify correctness.
    validations:
      required: true

  - type: checkboxes
    id: docs
    attributes:
      label: Doc changes checklist
      options:
        - label: "`CHANGELOG.md`"
        - label: "`CLAUDE.md` (if a convention changed)"
        - label: "`AGENTS.md` (keep in sync with CLAUDE.md)"
        - label: "`docs/architecture.md` — Build Log entry (if structure/module changed)"
        - label: "`docs/api.md` (if a public contract changed)"

  - type: textarea
    id: blocked
    attributes:
      label: Blocked by / Blocks / Safe to run in parallel
      placeholder: |
        - Blocked by: nothing
        - Blocks: nothing
        - Safe to run in parallel with: all
    validations:
      required: true

  - type: input
    id: milestone
    attributes:
      label: Milestone
      placeholder: "Phase 0 — Foundation & Standards"
    validations:
      required: true
