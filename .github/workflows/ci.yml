name: CI — PR Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - name: Theme correctness lint (issue #116)
        run: node scripts/lint-theme.mjs
      - name: Icon-system lint — no raw emoji outside the icon system (issue #136)
        run: node scripts/lint-icons.mjs

  # ── Job 2: Security scan ───────────────────────────────────────────────────
  security:
    name: Secret & security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check firebase.config.js is not committed
        run: |
          if git ls-files --error-unmatch src/services/firebase.config.js 2>/dev/null; then
            echo "❌ firebase.config.js must not be committed to the repo"
            exit 1
          fi
          echo "✅ firebase.config.js is not tracked"
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 3: Unit & integration tests ───────────────────────────────────────
  test-unit:
    name: Unit & integration tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  # ── Job 4: E2E tests ──────────────────────────────────────────────────────
  test-e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Set up Java 21 (required by Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Cache Firebase emulator JARs
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}
      - name: Write Firebase config
        env:
          FIREBASE_CONFIG_TEST: ${{ secrets.FIREBASE_CONFIG_TEST }}
        run: |
          if [ -n "$FIREBASE_CONFIG_TEST" ]; then
            echo "$FIREBASE_CONFIG_TEST" > src/services/firebase.config.js
            echo "FIREBASE_CONFIGURED=true" >> $GITHUB_ENV
          else
            cp src/services/firebase.config.example.js src/services/firebase.config.js
          fi
      - name: Start Firebase emulators
        if: env.FIREBASE_CONFIGURED == 'true'
        # Use demo-ascent so Firebase CLI starts without any authentication.
        # demo-* project IDs are a Firebase CLI convention that skips all network
        # calls to Google — the emulator runs fully offline. Any real project ID
        # in FIREBASE_CONFIG_TEST still works because connectAuthEmulator /
        # connectDatabaseEmulator redirect all SDK requests to the local ports.
        run: npx firebase emulators:start --only auth,database --project demo-ascent &
      - name: Wait for Firebase Auth emulator to be ready
        if: env.FIREBASE_CONFIGURED == 'true'
        run: |
          for i in {1..30}; do
            curl -sf http://127.0.0.1:9099/ && echo "Auth emulator ready" && break
            echo "Waiting... ($i/30)"
            sleep 2
          done
          curl -sf http://127.0.0.1:9099/ || { echo "❌ Auth emulator failed to start within 60 s"; exit 1; }
      - run: npm run test:e2e
      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # ── Job 5: Lighthouse CI performance budget (issue #137 Phase 3) ─────────
  lighthouse:
    name: Lighthouse CI (perf budget)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Write Firebase config (dummy, app just needs to boot to render '/')
        run: cp src/services/firebase.config.example.js src/services/firebase.config.js
      - name: Start dev server
        run: npm run dev &
      - name: Wait for dev server
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:4173/ && echo "Dev server ready" && break
            echo "Waiting... ($i/30)"
            sleep 1
          done
          curl -sf http://localhost:4173/ || { echo "❌ Dev server failed to start within 30s"; exit 1; }
      # Previously launched via a manually-resolved Playwright/"Chrome for
      # Testing" binary (CHROME_PATH override) reused from a separate
      # `playwright install` step, on the reasoning that test-e2e already
      # proves that exact browser works in this runner. In practice this was
      # the opposite of reliable: this job intermittently failed with
      # Lighthouse's own `NO_FCP` runtime error ("the page did not paint any
      # content") even against a landing page confirmed to paint correctly
      # and fast (~20ms) locally — a failure mode consistent with a Chrome
      # launch/compatibility issue specific to that override, not a real
      # perf regression, and not reproducible locally with the identical
      # Chrome binary and flags (macOS ARM64), pointing at CI's Linux runner
      # specifically. `npx @lhci/cli autorun` (what `treosh/lighthouse-ci-
      # action` itself runs under the hood, called directly here instead of
      # through the marketplace action) now launches its own bundled Chrome
      # the way the `lhci` CLI is actually tested and maintained to, with no
      # custom executable override — and the whole step is wrapped in a
      # retry loop, since even a well-configured headless Chrome launch in a
      # shared CI runner can occasionally hit a one-off resource hiccup
      # unrelated to any code change; a single transient failure here
      # shouldn't block an otherwise-green PR the way a real perf-budget
      # regression should.
      - name: Run Lighthouse CI against the landing page (retries on transient launch failures)
        run: |
          for attempt in 1 2 3; do
            echo "Lighthouse CI attempt $attempt/3"
            if npx @lhci/cli autorun --config=./lighthouserc.json; then
              echo "✅ Lighthouse CI passed on attempt $attempt"
              exit 0
            fi
            echo "⚠️ Attempt $attempt failed"
            sleep 5
          done
          echo "❌ Lighthouse CI failed after 3 attempts"
          exit 1

  # ── Job 6: PR checklist enforcement ───────────────────────────────────────
  pr-checklist:
    name: PR description check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR body is not empty template
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            if (body.trim().length < 50) {
              core.setFailed('PR description is empty or too short. Fill in the PR template.');
            }
            if (!body.includes('Closes #') && !body.includes('Refs #') && !body.includes('N/A')) {
              core.warning('PR does not reference a GitHub issue. Add "Closes #XX" or "Refs #XX".');
            }

      - name: Check CHANGELOG.md updated when src/ changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          SRC_CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -E '^src/' | wc -l)
          CHANGELOG_CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -c '^CHANGELOG.md' || true)

          if [ "$SRC_CHANGED" -gt 0 ] && [ "$CHANGELOG_CHANGED" -eq 0 ]; then
            echo "❌ src/ files changed but CHANGELOG.md has no diff in this PR."
            echo "   Add an entry under [Unreleased] in CHANGELOG.md."
            exit 1
          fi
          echo "✅ CHANGELOG check passed (src_changed=$SRC_CHANGED, changelog_changed=$CHANGELOG_CHANGED)"

      - name: Check docs/architecture.md updated when new module added
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          NEW_MODULES=$(git diff --name-only --diff-filter=A "$BASE" "$HEAD" \
            | grep -E '^src/(services|ui/components|ui/pages)/' | wc -l)
          ARCH_CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -c '^docs/architecture.md' || true)

          if [ "$NEW_MODULES" -gt 0 ] && [ "$ARCH_CHANGED" -eq 0 ]; then
            echo "❌ New module(s) added under src/services or src/ui but docs/architecture.md has no diff."
            echo "   Add a Build Log entry to docs/architecture.md."
            exit 1
          fi
          echo "✅ Architecture doc check passed (new_modules=$NEW_MODULES, arch_changed=$ARCH_CHANGED)"

      - name: Check sw.js CACHE_VERSION bumped when src/ changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          SRC_CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -E '^src/' | wc -l)
          SW_VERSION_CHANGED=$(git diff "$BASE" "$HEAD" -- sw.js | grep -c '^[+-]const CACHE_VERSION' || true)

          if [ "$SRC_CHANGED" -gt 0 ] && [ "$SW_VERSION_CHANGED" -eq 0 ]; then
            echo "❌ src/ files changed but sw.js's CACHE_VERSION wasn't bumped in this PR."
            echo "   /src/** and *.css are served with a short but real Cache-Control max-age"
            echo "   (see firebase.json, issue #185), and the service worker itself still"
            echo "   caches those same paths cache-first — bump CACHE_VERSION in sw.js so"
            echo "   returning visitors with a warm cache actually pick up this change."
            exit 1
          fi
          echo "✅ CACHE_VERSION check passed (src_changed=$SRC_CHANGED, sw_version_changed=$SW_VERSION_CHANGED)"

      - name: Check root CLAUDE.md stays under the line-count budget
        run: |
          LINES=$(wc -l < CLAUDE.md | tr -d ' ')
          LIMIT=220

          if [ "$LINES" -gt "$LIMIT" ]; then
            echo "❌ CLAUDE.md is $LINES lines, over the $LIMIT-line budget."
            echo "   Root CLAUDE.md is loaded in full on every Claude Code session — it must stay short."
            echo "   Move feature/area-specific content to .claude/rules/*.md (loads only when a matching"
            echo "   file is touched) or a multi-step procedure to .claude/skills/ (loads only on invocation)."
            echo "   See docs/adr/ADR-007-agent-memory-architecture.md for the full rationale (issue #86)."
            exit 1
          fi
          echo "✅ CLAUDE.md size check passed ($LINES / $LIMIT lines)"
