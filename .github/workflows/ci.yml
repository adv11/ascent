name: CI — PR Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint

  # ── Job 2: Security scan ───────────────────────────────────────────────────
  security:
    name: Secret & security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check firebase.config.js is not committed
        run: |
          if git ls-files --error-unmatch src/services/firebase.config.js 2>/dev/null; then
            echo "❌ firebase.config.js must not be committed to the repo"
            exit 1
          fi
          echo "✅ firebase.config.js is not tracked"
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 3: Unit & integration tests ───────────────────────────────────────
  test-unit:
    name: Unit & integration tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  # ── Job 4: E2E tests ──────────────────────────────────────────────────────
  test-e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Set up Java 21 (required by Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Write Firebase config
        env:
          FIREBASE_CONFIG_TEST: ${{ secrets.FIREBASE_CONFIG_TEST }}
        run: |
          if [ -n "$FIREBASE_CONFIG_TEST" ]; then
            echo "$FIREBASE_CONFIG_TEST" > src/services/firebase.config.js
            echo "FIREBASE_CONFIGURED=true" >> $GITHUB_ENV
          else
            cp src/services/firebase.config.example.js src/services/firebase.config.js
          fi
      - name: Start Firebase emulators
        if: env.FIREBASE_CONFIGURED == 'true'
        run: npx firebase emulators:start --only auth,database &
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      - name: Wait for Firebase Auth emulator to be ready
        if: env.FIREBASE_CONFIGURED == 'true'
        run: |
          for i in {1..30}; do
            curl -sf http://127.0.0.1:9099/ && echo "Auth emulator ready" && break
            echo "Waiting... ($i/30)"
            sleep 2
          done
      - run: npm run test:e2e
      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # ── Job 5: PR checklist enforcement ───────────────────────────────────────
  pr-checklist:
    name: PR description check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR body is not empty template
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            if (body.trim().length < 50) {
              core.setFailed('PR description is empty or too short. Fill in the PR template.');
            }
            if (!body.includes('Closes #') && !body.includes('Refs #') && !body.includes('N/A')) {
              core.warning('PR does not reference a GitHub issue. Add "Closes #XX" or "Refs #XX".');
            }

      - name: Check CHANGELOG.md updated when src/ changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          SRC_CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -E '^src/' | wc -l)
          CHANGELOG_CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -c '^CHANGELOG.md' || true)

          if [ "$SRC_CHANGED" -gt 0 ] && [ "$CHANGELOG_CHANGED" -eq 0 ]; then
            echo "❌ src/ files changed but CHANGELOG.md has no diff in this PR."
            echo "   Add an entry under [Unreleased] in CHANGELOG.md."
            exit 1
          fi
          echo "✅ CHANGELOG check passed (src_changed=$SRC_CHANGED, changelog_changed=$CHANGELOG_CHANGED)"

      - name: Check docs/architecture.md updated when new module added
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          NEW_MODULES=$(git diff --name-only --diff-filter=A "$BASE" "$HEAD" \
            | grep -E '^src/(services|ui/components|ui/pages)/' | wc -l)
          ARCH_CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -c '^docs/architecture.md' || true)

          if [ "$NEW_MODULES" -gt 0 ] && [ "$ARCH_CHANGED" -eq 0 ]; then
            echo "❌ New module(s) added under src/services or src/ui but docs/architecture.md has no diff."
            echo "   Add a Build Log entry to docs/architecture.md."
            exit 1
          fi
          echo "✅ Architecture doc check passed (new_modules=$NEW_MODULES, arch_changed=$ARCH_CHANGED)"
