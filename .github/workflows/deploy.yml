name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow the action to post preview-channel URLs as PR comments
permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Firebase Hosting deploy
    runs-on: ubuntu-latest
    # Issue #189 — without this, two rapid pushes to main can trigger
    # overlapping deploy runs with no ordering guarantee: the
    # slower-starting-but-earlier-commit job could finish after the
    # newer-commit job, briefly serving an older commit as "live" right
    # after a newer one was already deployed. Queue instead of racing;
    # never cancel a deploy mid-flight (cancel-in-progress: false).
    concurrency:
      group: ${{ github.workflow }}-main
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      # Check whether the deploy secrets are available.
      # Secrets cannot be read in `if:` expressions directly, so we probe
      # via env vars and emit step outputs.
      #
      # Issue #190: a deploy only actually happens when FIREBASE_SERVICE_ACCOUNT
      # is set (see the deploy steps' `if:` below) — so FIREBASE_CONFIG being
      # unset is only dangerous when a deploy would otherwise proceed. It used
      # to fall back to the example placeholder file and only log a warning
      # regardless of whether a real deploy would follow, which meant a
      # cleared/misconfigured secret could silently deploy a fully
      # non-functional app (placeholder Firebase keys — every Auth/Database
      # call fails) straight to the live production channel, with nothing but
      # a workflow-log warning to notice it by. Now: if a deploy would run
      # (SERVICE_ACCOUNT set) but FIREBASE_CONFIG is missing, fail the job
      # outright instead of writing placeholder config. If no deploy would run
      # anyway (SERVICE_ACCOUNT unset, e.g. this repo today), a missing
      # FIREBASE_CONFIG is harmless — warn and continue, same as before.
      - name: Check deploy readiness
        id: ready
        env:
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SWITCHPREP_ADV26 }}
        run: |
          if [ -n "$SERVICE_ACCOUNT" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  FIREBASE_SERVICE_ACCOUNT secret not set — deploy steps skipped"
            echo "   Add the secret in GitHub → Settings → Secrets and variables → Actions"
            echo "   See docs/architecture.md#cicd for setup instructions"
          fi

      # Write the client-side Firebase config from the GitHub Secret.
      # FIREBASE_CONFIG is a JSON object stored as a repository secret.
      - name: Write Firebase client config
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          DEPLOY_READY: ${{ steps.ready.outputs.ok }}
        run: |
          if [ -n "$FIREBASE_CONFIG" ]; then
            echo "$FIREBASE_CONFIG" > src/services/firebase.config.js
          elif [ "$DEPLOY_READY" = "true" ]; then
            echo "::error::FIREBASE_CONFIG secret not set — refusing to deploy with placeholder Firebase config. Add the secret in GitHub → Settings → Secrets and variables → Actions (see docs/architecture.md#cicd)."
            exit 1
          else
            echo "⚠️  FIREBASE_CONFIG secret not set — using placeholder config (no deploy will run, FIREBASE_SERVICE_ACCOUNT is also unset)"
            cp src/services/firebase.config.example.js src/services/firebase.config.js
          fi

      # PR → deploy to a temporary preview channel (expires in 7 days).
      # The action posts the preview URL as a PR comment automatically.
      - name: Deploy preview channel (PR)
        if: steps.ready.outputs.ok == 'true' && github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SWITCHPREP_ADV26 }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: pr-${{ github.event.number }}
          expires: 7d

      # main push → deploy to the live production channel.
      - name: Deploy to production (main)
        if: steps.ready.outputs.ok == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SWITCHPREP_ADV26 }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live

      # Issue #153 root cause #5 — firebase/database.rules.json was previously
      # ONLY ever deployed by someone manually running `firebase deploy
      # --only database` locally (root CLAUDE.md's own "Deploying" section
      # documented this as manual-only). That meant the rules actually
      # enforced against the live project could silently drift arbitrarily
      # far from what's in this repo, with no CI signal — a stale ruleset
      # rejecting a write to a newer path/field is indistinguishable, from a
      # user's perspective, from any other "Save failed" error. Deploying
      # rules on every push to main (same trigger as hosting, above) closes
      # that gap; firebase-tools authenticates via
      # GOOGLE_APPLICATION_CREDENTIALS pointing at the same service-account
      # JSON already used for the hosting deploy above, no new secret needed.
      - name: Deploy database rules (main)
        if: steps.ready.outputs.ok == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SWITCHPREP_ADV26 }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools@latest deploy --only database --project "${{ vars.FIREBASE_PROJECT_ID }}" --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
