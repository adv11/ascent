name: Issue label check

on:
  issues:
    types: [opened, edited]

jobs:
  check-labels:
    name: Verify required label categories
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check type / priority / domain labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            const issueNumber = context.payload.issue.number;

            const hasType       = labels.some(l => l.startsWith('type:'));
            const priorityCount = labels.filter(l => l.startsWith('priority:')).length;
            const hasDomain     = labels.some(l => l.startsWith('domain:'));

            const missing = [];
            if (!hasType)          missing.push('`type:*`');
            if (priorityCount === 0) missing.push('`priority:*`');
            if (!hasDomain)        missing.push('`domain:*`');

            const extraPriority = priorityCount > 1;

            if (missing.length === 0 && !extraPriority) {
              core.info('All three label categories present — OK');
              return;
            }

            const msg = [
              missing.length > 0
                ? `⚠️ **Missing required labels:** ${missing.join(', ')}`
                : `⚠️ **Too many priority labels:** found ${priorityCount}, expected exactly 1`,
              '',
              'Every issue must have **all three** label categories:',
              '- **Type** (≥ 1): `type:feat` `type:fix` `type:refactor` `type:test` `type:docs` `type:chore` `type:design` `type:security` `type:perf`',
              '- **Priority** (exactly 1): `priority:critical` `priority:high` `priority:medium` `priority:low`',
              '- **Domain** (≥ 1): `domain:auth` `domain:storage` `domain:roadmap` `domain:ui` `domain:import` `domain:a11y` `domain:brand` `domain:infra` `domain:security`',
              '',
              'See [CLAUDE.md](../blob/main/CLAUDE.md) for the full label taxonomy.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: msg,
            });

            if (missing.length > 0) {
              core.warning(`Issue #${issueNumber} is missing label categories: ${missing.join(', ')}`);
            } else {
              core.warning(`Issue #${issueNumber} has ${priorityCount} priority labels, expected exactly 1`);
            }
