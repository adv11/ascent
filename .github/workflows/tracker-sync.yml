name: Sync master tracker

on:
  pull_request:
    types: [opened, closed]
    branches: [main]

# All runs of this workflow read-modify-write the SAME resource (issue #11's
# body), regardless of which PR/branch triggered them. Without this, two runs
# triggered close together (e.g. one PR's merge event and another PR's opened
# event) can interleave: run B's GET fetches the tracker body before run A's
# PUT lands, so run B's PUT — a full-body replace — silently overwrites run
# A's update with a stale copy. This is exactly what caused issue #56's row
# to keep showing "🔀 PR #76 open" after PR #76 had already merged: PR #77's
# later runs re-saved a snapshot taken before #56's merge-update was written.
# A single fixed group name (not scoped to `github.ref`/PR number) serializes
# every run of this workflow against every other one; `cancel-in-progress:
# false` queues a newer run behind an in-flight older one instead of
# cancelling it, since cancelling would drop that PR's tracker update
# entirely rather than just delaying it.
concurrency:
  group: tracker-sync-issue-11
  cancel-in-progress: false

jobs:
  sync:
    name: Update tracker #11
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr    = context.payload.pull_request;
            const prNum = pr.number;
            const body  = pr.body || '';
            const opened = context.payload.action === 'opened';
            const merged = context.payload.action === 'closed' && pr.merged;

            if (!opened && !merged) return; // ignore unmerged closes

            // Collect every issue number from "Refs #N" / "Closes #N" / "Fixes #N"
            const refs = [...body.matchAll(/(?:Refs|Closes|Fixes)\s+#(\d+)/gi)];
            const issues = [...new Set(refs.map(m => m[1]))];

            if (issues.length === 0) {
              console.log('No issue refs in PR body — nothing to update');
              return;
            }

            // Fetch current tracker body
            const { data: tracker } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 11,
            });

            let trackerBody = tracker.body;

            for (const n of issues) {
              const tableStatus = opened
                ? `🔀 PR #${prNum} open`
                : `✅ Done — merged PR #${prNum}`;
              const refEmoji = opened ? '🔀' : '✅';

              trackerBody = trackerBody.split('\n').map(line => {
                // 1. Table row with **#N** — replace last | cell |
                if (line.trim().startsWith('|') && line.includes(`**#${n}**`)) {
                  return line.replace(/\|[^|]*\|\s*$/, `| ${tableStatus} |`);
                }
                // 2. Reference table row (contains "Step" and the issue ref)
                if (line.includes('Step') && line.includes(`#${n}`)) {
                  return line.replace(
                    new RegExp(`(#${n})(?![\\dA-Za-z])(?:\\s*(?:🔄|🔀|⬜|✅))?`, 'gu'),
                    `$1 ${refEmoji}`,
                  );
                }
                return line;
              }).join('\n');

              // 3. Step banner: "> 🔀 **#N PR #prNum open**" → "✅ … merged"
              if (merged) {
                trackerBody = trackerBody.replace(
                  new RegExp(`(>\\s*)🔀(\\s*\\*\\*#${n} PR #${prNum})\\s*open`, 'gm'),
                  `$1✅$2 merged`,
                );
              }
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 11,
              body: trackerBody,
            });

            const action = opened ? `🔀 PR #${prNum} open` : `✅ merged PR #${prNum}`;
            console.log(`Tracker updated — issues ${issues.map(n => `#${n}`).join(', ')} → ${action}`);
