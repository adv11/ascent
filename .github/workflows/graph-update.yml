name: Update knowledge graph

# Keeps graphify-out/ (the local code-graph knowledge base, issue #210) in sync
# with the codebase after every merge to main, so future AI-assistant sessions
# never work off a stale graph. This repo is code-only, so `graphify update .`
# is pure AST extraction — no LLM/API key involved, no cost beyond CI minutes.
#
# Deliberately does NOT push straight to main: it opens a PR instead, so an
# unattended job never has direct write access to main, and a human reviews
# the graph diff before it merges (same reasoning as every other doc/schema
# change in this repo). graphifyy is pinned to a known-good version rather
# than installed unpinned, since this runs automatically and unattended.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: graph-update
  cancel-in-progress: false

jobs:
  update-graph:
    name: Regenerate graphify-out/
    runs-on: ubuntu-latest
    # Skip the commit this workflow's own merged PR makes, to avoid a loop.
    if: "!contains(github.event.head_commit.message, '[skip graph-update]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install graphify (pinned)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv tool install "graphifyy==0.9.17" -q

      - name: Regenerate graph (incremental)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          graphify update .

      - name: Open PR with updated graph
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update knowledge graph [skip graph-update]"
          branch: chore/graph-auto-update
          delete-branch: true
          title: "chore: update knowledge graph"
          body: |
            Auto-generated by `.github/workflows/graph-update.yml` after the most
            recent push to `main`. Regenerates `graphify-out/` via `graphify update .`
            (incremental, AST-only, no LLM cost) so the committed graph stays in sync
            with the codebase. Review the diff, then merge.
          add-paths: |
            graphify-out/graph.json
            graphify-out/graph.html
            graphify-out/GRAPH_REPORT.md
            graphify-out/manifest.json
            graphify-out/wiki
